name: Monthly Allocation Update

# ─────────────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────────────
on:
  # Runs at 9:00 AM UTC on the 1st of every month
  schedule:
    - cron: '0 9 1 * *'

  # Lets you trigger it manually from the GitHub Actions tab
  # (useful for testing without waiting for the 1st)
  workflow_dispatch:
    inputs:
      demo_mode:
        description: 'Run in demo mode (no live API calls)?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

# ─────────────────────────────────────────────────────
# PERMISSIONS — needed to commit data back to the repo
# ─────────────────────────────────────────────────────
permissions:
  contents: write

jobs:
  update:
    name: Fetch & Commit Allocation Data
    runs-on: ubuntu-latest

    steps:
      # 1 ── Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2 ── Python setup
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # 3 ── Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4 ── Run the scraper
      #     Secrets are set in: Repo → Settings → Secrets → Actions
      - name: Fetch allocation data from providers
        env:
          # NDR credentials
          NDR_USER:    ${{ secrets.NDR_USER }}
          NDR_PASS:    ${{ secrets.NDR_PASS }}
          NDR_API_URL: ${{ secrets.NDR_API_URL }}   # optional override
          # BlackRock / iShares credentials
          BL_USER:     ${{ secrets.BL_USER }}
          BL_PASS:     ${{ secrets.BL_PASS }}
          BL_API_URL:  ${{ secrets.BL_API_URL }}    # optional override
          # BCA Research credentials
          BCA_USER:    ${{ secrets.BCA_USER }}
          BCA_PASS:    ${{ secrets.BCA_PASS }}
          BCA_API_URL: ${{ secrets.BCA_API_URL }}   # optional override
        run: |
          DEMO_FLAG=""
          if [ "${{ github.event.inputs.demo_mode }}" = "true" ]; then
            DEMO_FLAG="--demo"
            echo "Running in DEMO mode"
          fi
          python python/update_data.py $DEMO_FLAG

      # 5 ── Commit updated data back to main
      - name: Commit updated allocations.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/allocations.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to commit — data unchanged since last run."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "auto: update allocations ${DATE}"
            git push
            echo "Pushed updated allocations.json"
          fi

      # 6 ── Report errors (if any providers failed, still succeeds overall)
      - name: Check for provider errors
        run: |
          python - <<'EOF'
          import json, sys
          with open("data/allocations.json") as f:
              data = json.load(f)
          errors = data.get("errors", {})
          if errors:
              print(f"WARNING: {len(errors)} provider(s) used fallback data: {list(errors.keys())}")
              for name, msg in errors.items():
                  print(f"  {name}: {msg}")
          else:
              print("All providers fetched successfully.")
          EOF
