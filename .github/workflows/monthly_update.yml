name: Monthly Allocation Update

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of every month, 9 AM UTC
  workflow_dispatch:
    inputs:
      demo_mode:
        description: 'Run in demo mode? (no live logins)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scrapers
        env:
          NDR_USER: ${{ secrets.NDR_USER }}
          NDR_PASS: ${{ secrets.NDR_PASS }}
          BCA_USER: ${{ secrets.BCA_USER }}
          BCA_PASS: ${{ secrets.BCA_PASS }}
        run: |
          DEMO=""
          if [ "${{ github.event.inputs.demo_mode }}" = "true" ]; then
            DEMO="--demo"
            echo "Running in DEMO mode"
          fi
          cd python && python update_data.py $DEMO

      - name: Print summary
        run: |
          python3 - << 'EOF'
          import json
          with open("data/allocations.json") as f:
              d = json.load(f)
          print(f"\nData as of: {d['as_of']}")
          print(f"Assets recorded: {len(d.get('assets', []))}")
          print(f"History months: {len(d.get('history', []))}")
          for k, s in d.get('sources', {}).items():
              icon = "✓" if s['status'] in ('live','demo') else "✗"
              print(f"  {icon} {k.upper()}: {s['status']} — {s['message'][:80]}")
          EOF

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/allocations.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: allocation update $(date +%Y-%m-%d)"
            git push
          fi
