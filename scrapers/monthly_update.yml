name: Monthly Allocation Update

# ─────────────────────────────────────────────────────
# WHEN THIS RUNS:
#   1. Automatically on the 1st of every month at 9 AM UTC
#   2. Manually anytime from the GitHub Actions tab
#      (use this to test after adding credentials)
# ─────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 9 1 * *'

  workflow_dispatch:
    inputs:
      demo_mode:
        description: 'Run in demo mode? (no live logins, uses fallback data)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    name: Fetch Signals & Update Dashboard
    runs-on: ubuntu-latest

    steps:

      # 1 — Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 — Python setup
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3 — Install Python dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4 — Install Playwright + Chromium (needed for NDR's JS-rendered portal)
      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      # 5 — Run the scrapers
      #     YOUR CREDENTIALS ARE INJECTED HERE FROM GITHUB SECRETS
      #     They are encrypted — never visible in logs
      - name: Fetch allocation signals from all providers
        env:
          # NDR credentials (stored in GitHub Secrets)
          NDR_USER: ${{ secrets.NDR_USER }}
          NDR_PASS: ${{ secrets.NDR_PASS }}
          # BlackRock (public — no credentials needed, but included for future)
          BL_USER:  ${{ secrets.BL_USER }}
          BL_PASS:  ${{ secrets.BL_PASS }}
          # BCA Research credentials (stored in GitHub Secrets)
          BCA_USER: ${{ secrets.BCA_USER }}
          BCA_PASS: ${{ secrets.BCA_PASS }}
        run: |
          cd python
          DEMO=""
          if [ "${{ github.event.inputs.demo_mode }}" = "true" ]; then
            DEMO="--demo"
            echo "Running in DEMO mode — no live logins"
          fi
          python update_data.py $DEMO

      # 6 — Print a summary of what was retrieved
      - name: Print retrieval summary
        run: |
          python - << 'EOF'
          import json, sys
          try:
              with open("data/source_status.json") as f:
                  status = json.load(f)
              print("\n━━━ RETRIEVAL SUMMARY ━━━")
              for p in status.get("providers", []):
                  icon = "✓" if p["status"] == "live" else "✗"
                  print(f"  {icon}  {p['firm']}: {p['status'].upper()}")
                  print(f"       {p['message'][:120]}")
              print("")
          except Exception as e:
              print(f"Could not read status file: {e}")
          EOF

      # 7 — Commit the updated data files back to the repo
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/allocations.json data/source_status.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "auto: update allocations ${DATE}"
            git push
            echo "Pushed updated data files."
          fi

      # 8 — If anything failed, surface it clearly
      - name: Check for retrieval failures
        run: |
          python - << 'EOF'
          import json, sys
          try:
              with open("data/source_status.json") as f:
                  status = json.load(f)
              failures = [p for p in status.get("providers", []) if p["status"] == "failed"]
              if failures:
                  print(f"\n⚠  {len(failures)} provider(s) failed live retrieval:")
                  for p in failures:
                      print(f"   {p['firm']}: {p['message']}")
                  print("\nThe dashboard will show previous month's signals for failed providers.")
                  print("Check the logs above for details on what went wrong.")
                  # Exit 0 so the workflow doesn't fail completely —
                  # partial data is better than no commit at all
                  sys.exit(0)
              else:
                  print("All providers retrieved successfully.")
          except Exception as e:
              print(f"Could not read status: {e}")
          EOF
